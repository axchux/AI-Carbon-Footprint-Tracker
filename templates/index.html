<!DOCTYPE html>
<html>
<head>
<title>Carbon Footprint Tracker</title>
</head>

<body>
<h2>Carbon Footprint Calculator</h2>

<form method="POST">
Transport distance (km): <input type="number" name="km"><br><br>
Electricity usage (kWh): <input type="number" name="electricity"><br><br>
<button type="submit">Calculate</button>
</form>

{% if result %}
<h3>Your Carbon Footprint: {{result}} kg CO2</h3>
{% endif %}

</body>
</html>
